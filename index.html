<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>색칠놀이</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Home Screen -->
  <div id="screen-home" class="screen active">
    <h1 class="home-title">색칠놀이</h1>
    <p class="home-subtitle">터치하면 색이 칠해져요!</p>
    <div class="home-buttons">
      <button id="btn-templates" class="btn-home btn-templates-style">
        <span class="btn-icon">🎨</span> 그림 고르기
      </button>
      <button id="btn-photo" class="btn-home btn-photo-style">
        <span class="btn-icon">📷</span> 사진 가져오기
      </button>
    </div>
    <input type="file" id="file-input" accept="image/*" hidden>
  </div>

  <!-- Template Picker Screen -->
  <div id="screen-picker" class="screen">
    <div class="picker-header">
      <button id="btn-back-picker" class="btn-icon-only" aria-label="뒤로">◀</button>
      <h2>그림을 골라보세요!</h2>
    </div>
    <div id="template-grid" class="template-grid"></div>
  </div>

  <!-- Coloring Screen -->
  <div id="screen-coloring" class="screen">
    <div class="coloring-toolbar">
      <button id="btn-back" class="btn-tool" aria-label="뒤로" title="뒤로">◀</button>
      <span id="coloring-title" class="coloring-title">색칠놀이</span>
      <button id="btn-undo" class="btn-tool" aria-label="되돌리기" title="되돌리기">↩</button>
      <button id="btn-reset" class="btn-tool" aria-label="초기화" title="초기화">🔄</button>
      <button id="btn-save" class="btn-tool" aria-label="저장" title="저장">💾</button>
    </div>
    <div class="drawing-area" id="drawing-area">
      <div class="drawing-transform" id="drawing-transform">
        <div id="svg-container"></div>
        <canvas id="paint-canvas"></canvas>
      </div>
      <div class="zoom-controls">
        <button id="btn-zoom-in" class="btn-zoom" aria-label="확대">+</button>
        <div id="zoom-level" class="zoom-level">100%</div>
        <button id="btn-zoom-out" class="btn-zoom" aria-label="축소">−</button>
        <button id="btn-zoom-reset" class="btn-zoom" aria-label="원래크기" style="font-size:0.9rem">↺</button>
      </div>
    </div>
    <div id="palette" class="palette-bar"></div>
  </div>

  <script src="js/templates.js"></script>
  <script src="js/image-templates.js"></script>
  <script src="js/color-palette.js"></script>
  <script src="js/svg-coloring.js"></script>
  <script src="js/canvas-coloring.js"></script>
  <script src="js/app.js"></script>
  <script src="js/zoom.js"></script>
</body>
</html>
